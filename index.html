<!DOCTYPE html>
<html lang="tr">
<head>
<script>
(function(){
  "use strict";
  function isTWA(){
    if(document.referrer && document.referrer.indexOf("android-app://")===0) return true;
    try{
      if(window.matchMedia("(display-mode: standalone)").matches) return true;
      if(window.matchMedia("(display-mode: fullscreen)").matches) return true;
    }catch(e){}
    if(window.navigator.standalone===true) return true;
    var ua=navigator.userAgent||"";
    if(/Android/.test(ua)&&/wv/.test(ua)) return true;
    return false;
  }
  var target = isTWA()
    ? "mobil/index-mobil.html"
    : "web/index-web.html";
  window.location.replace(target+(window.location.search||"")+(window.location.hash||""));
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#4318ff">
<title>MuGöl PORTAL</title>
<style>
html,body{margin:0;padding:0;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.r{display:flex;flex-direction:column;align-items:center;gap:16px;}
.ring{width:52px;height:52px;border-radius:50%;border:4px solid rgba(255,255,255,.1);border-top-color:#4318ff;animation:spin .9s linear infinite;}
.txt{color:rgba(255,255,255,.45);font-size:.83rem;font-family:sans-serif;font-weight:700;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="r"><div class="ring"></div><div class="txt">Yükleniyor...</div></div>
</body>
</html>
